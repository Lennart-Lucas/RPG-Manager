name: rpg_manager
description: "RPG Manager Flutter app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  pdfrx: ^2.4.7
  font_awesome_flutter: ^11.0.0
  pdf: ^3.11.1
  printing: ^5.13.0
  random_table_engine:
    path: ../packages/random_table_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/monstrous_traits.json
